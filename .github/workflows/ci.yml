name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # The Fyne GUI package needs CGO + a C compiler; the engine, the CLI and
      # all the logic packages are CGO-free and are what the tests cover.
      - name: Vet and test (engine, CLI, logic packages)
        shell: bash
        env:
          CGO_ENABLED: "0"
        run: |
          pkgs=$(go list ./... | grep -v '/internal/gui' | grep -v '/cmd/vsm$')
          echo "Packages under test:"
          echo "$pkgs"
          go vet $pkgs
          go test -v $pkgs

      - name: Build CLI
        shell: bash
        env:
          CGO_ENABLED: "0"
        run: go build -o vsm-cli.exe ./cmd/vsm-cli
